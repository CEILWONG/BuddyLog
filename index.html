<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuddyLog - 你的老友日记</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f4f9; }
        /* 侧边栏 */
        #sidebar { width: 250px; background: #fff; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        #sidebar h2 { font-size: 1.2rem; color: #333; }
        .file-item { padding: 8px; cursor: pointer; border-radius: 4px; color: #555; font-size: 0.9rem; }
        .file-item:hover { background: #eef; }
        /* 主聊天区 */
        #main { flex: 1; display: flex; flex-direction: column; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .buddy { align-self: flex-start; background: #fff; border: 1px solid #ddd; border-bottom-left-radius: 2px; }
        .system-note { align-self: center; font-size: 0.8rem; color: #888; background: #e9ecef; padding: 4px 10px; border-radius: 20px; }
        /* 输入区 */
        #input-area { padding: 20px; background: #fff; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>📅 记忆档案</h2>
    <div id="file-list">加载中...</div>
</div>

<div id="main">
    <div id="chat-box">
        <div class="message buddy">嘿！我是 Buddy。今天过得怎么样？随便聊聊，我会帮你记下来的。</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="跟 Buddy 说点什么..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" id="send-btn">发送</button>
        <button onclick="completeToday()" id="complete-btn">完成今日记录</button>
    </div>
    
    <!-- 日记确认弹窗 -->
    <div id="archive-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 10px; width: 80%; max-width: 600px;">
            <h2>📝 确认今日记录</h2>
            <div id="structured-data" style="margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 5px;"></div>
            <div id="diary-preview" style="margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 5px; max-height: 200px; overflow-y: auto;"></div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="cancelArchive()" style="padding: 10px 20px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;">取消</button>
                <button onclick="confirmArchive()" style="padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">确认归档</button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let history = [];

    // 加载文件列表
    async function loadFiles() {
        const res = await fetch('/files');
        const files = await res.json();
        const list = document.getElementById('file-list');
        list.innerHTML = files.length ? '' : '<div style="color:#999">暂无记录</div>';
        files.forEach(f => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerText = f.replace('.md', '');
            div.onclick = () => alert('查看功能开发中... (文件位于 data/' + f + ')');
            list.appendChild(div);
        });
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';
        sendBtn.disabled = true;

        history.push({ role: "user", content: text });

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: text, history: history.slice(-10) }) // 只传最近10条
            });
            const data = await res.json();

            appendMessage('buddy', data.reply);

            if (data.diary_saved) {
                const note = document.createElement('div');
                note.className = 'system-note';
                note.innerText = `✨ Buddy 已将其记入 ${data.filename}`;
                chatBox.appendChild(note);
                loadFiles(); // 刷新列表
            }

            history.push({ role: "assistant", content: data.reply });
        } catch (e) {
            appendMessage('buddy', '哎呀，网络开小差了，请稍后再试。');
            console.error(e);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    loadFiles();

    // 完成今日记录
    async function completeToday() {
        if (history.length === 0) {
            alert('今天还没有聊天记录，无法完成记录');
            return;
        }

        const sendBtn = document.getElementById('send-btn');
        const completeBtn = document.getElementById('complete-btn');
        sendBtn.disabled = true;
        completeBtn.disabled = true;

        try {
            // 调用归档API
            const res = await fetch('/archive', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ conversation: history })
            });
            
            const data = await res.json();
            
            if (data.success) {
                // 显示确认弹窗
                const modal = document.getElementById('archive-modal');
                const structuredData = document.getElementById('structured-data');
                const diaryPreview = document.getElementById('diary-preview');
                
                // 显示结构化数据
                structuredData.innerHTML = `<h3>结构化信息</h3>
                    <p><strong>事件:</strong> ${data.structured_data.events.join(', ')}</p>
                    <p><strong>人物:</strong> ${data.structured_data.people.join(', ')}</p>
                    <p><strong>情绪:</strong> ${data.structured_data.emotions.join(', ')}</p>
                    <p><strong>想法:</strong> ${data.structured_data.ideas.join(', ')}</p>`;
                
                // 显示日记预览
                diaryPreview.innerHTML = `<h3>日记预览</h3><p>${data.diary_article}</p>`;
                
                // 显示弹窗
                modal.style.display = 'block';
            } else {
                alert('归档失败，请稍后再试');
            }
        } catch (e) {
            console.error(e);
            alert('网络错误，请稍后再试');
        } finally {
            sendBtn.disabled = false;
            completeBtn.disabled = false;
        }
    }

    // 取消归档
    function cancelArchive() {
        const modal = document.getElementById('archive-modal');
        modal.style.display = 'none';
    }

    // 确认归档
    function confirmArchive() {
        const modal = document.getElementById('archive-modal');
        modal.style.display = 'none';
        
        // 显示成功消息
        const note = document.createElement('div');
        note.className = 'system-note';
        note.innerText = '✨ 今日记录已完成归档！';
        chatBox.appendChild(note);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        // 刷新文件列表
        loadFiles();
    }
</script>
</body>
</html>
